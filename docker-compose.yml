# Frontend будет добавлен в шаге 0.3.
name: auto-rag

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - .env
    ports:
      - "8000:8000"
    working_dir: /app
    volumes:
      - ./data:/app/data
      - ./exports:/app/exports
      - ./temp:/app/temp
